{% extends "base.html" %}
{% block title %}Analytics — Super Admin{% endblock %}

{% block content %}
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="/super/dashboard" class="sidebar-logo">
                <div class="sidebar-logo-icon">👑</div>
                <span class="sidebar-logo-text">Super Admin</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="/super/dashboard" class="nav-item">
                <span class="nav-item-icon"><i class="fas fa-crown"></i></span>
                <span class="nav-item-label">Dashboard</span>
            </a>
            <a href="/super/analytics" class="nav-item active">
                <span class="nav-item-icon"><i class="fas fa-chart-line"></i></span>
                <span class="nav-item-label">Analytics</span>
            </a>
        </nav>
    </aside>

    <div class="main-wrapper">
        <div class="top-bar">
            <div class="logo-text">📊 Platform Analytics</div>
        </div>

        <div class="content-area page-enter">
            <div class="glass-card">
                <h2 style="margin-bottom:var(--sp-5);">Sessions by Month</h2>
                <table class="inv-table">
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Total Sessions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in sessions_by_month %}
                        <tr>
                            <td>{{ row.month }}</td>
                            <td>{{ row.count }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
